version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "miniforge3-latest"

sphinx:
   configuration: docs/conf.py
   fail_on_warning: false

conda:
  environment: devtools/conda-envs/docs.yml

python:
  # Install our python package before building the docs
  install:
    - method: pip
      path: .
